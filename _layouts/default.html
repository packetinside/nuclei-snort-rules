<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title | default: page.title }}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown.min.css">
    
    <style>
        /* 1. 화면 너비 설정 (95% 사용) */
        body { 
            box-sizing: border-box; 
            min-width: 200px; 
            max-width: 95%; 
            margin: 0 auto; 
            padding: 45px; 
        }

        @media (max-width: 767px) { 
            body { padding: 15px; } 
        }
        
        /* 링크 스타일 */
        a { text-decoration: none; color: #0969da; }
        a:hover { text-decoration: underline; }

        /* [핵심 수정] 테이블 스타일: 가로줄(O), 세로줄(X) */
        .markdown-body table {
            display: table;
            width: 100%;
            border-collapse: collapse; /* 선이 겹치지 않게 */
        }
        
        /* 헤더(th)와 셀(td) 스타일 설정 */
        .markdown-body table th,
        .markdown-body table td {
            /* 1. 일단 모든 테두리를 없앱니다 (세로줄 제거 효과) */
            border: none !important;
            
            /* 2. 아래쪽 테두리(가로줄)만 다시 그립니다 (색상은 연한 회색) */
            border-bottom: 1px solid #e1e4e8 !important;
            
            /* 3. 여백 조정 */
            padding: 12px 8px !important;
        }

        /* 선택사항: 맨 마지막 줄은 가로선 없애기 (깔끔함 유지) */
        .markdown-body table tr:last-child td {
            border-bottom: none !important;
        }

        /* 헤더 스타일: 왼쪽 정렬 */
        header {
            margin-bottom: 40px;
            width: 100%;
            text-align: left;
        }
        header h1 {
            font-size: 2em;
            margin-bottom: 0.2em;
            border-bottom: none; 
        }
        header p {
            font-size: 1.1em;
            color: #57606a;
            margin-bottom: 15px;
        }
        
        /* GitHub 프로필 버튼 */
        .github-btn {
            display: inline-block;
            padding: 8px 16px;
            color: #24292e !important;
            background-color: #f6f8fa;
            border: 1px solid rgba(27,31,35,0.15);
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none !important;
            transition: 0.2s;
        }
        .github-btn:hover {
            background-color: #f3f4f6;
            border-color: rgba(27,31,35,0.15);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        
        <header>
            <h1>{{ site.title | default: "Nuclei & Snort Rules Archive" }}</h1>
            <p>{{ site.description | default: "nuclei-Templates Snort Signature" }}</p>
            {% if site.github.owner_url %}
            <a href="{{ site.github.owner_url }}" class="github-btn">
                View My GitHub Profile
            </a>
            {% endif %}
        </header>

        <hr>

        {{ content }}
        
        <footer style="margin-top: 50px; text-align: center; font-size: 0.8em; color: #777;">
            <hr>
            <p>Security Rules Archive by PacketInside</p>
        </footer>
    </div>
</body>
</html>
